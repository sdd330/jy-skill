name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  quality:
    name: Pre-release checks
    uses: ./.github/workflows/quality-gate.yml

  release:
    name: Publish GitHub Release
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: ./.github/actions/setup

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -pe "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Pack skill zip
        run: pnpm run pack:skill

      - name: Verify zip contents
        run: node scripts/pack-skill.mjs --verify

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: jy-skill.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
