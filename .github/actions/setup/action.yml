name: Setup pnpm
description: Install Node.js, pnpm, and project dependencies

inputs:
  node-version:
    description: Node.js version
    default: '22'

outputs:
  node-version:
    description: Node.js version in use
    value: ${{ inputs.node-version }}
  pnpm-version:
    description: pnpm version in use
    value: '11.8.0'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.8.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
